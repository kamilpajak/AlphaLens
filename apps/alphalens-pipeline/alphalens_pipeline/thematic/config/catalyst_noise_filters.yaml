# Catalyst noise filters consumed by catalyst_resolver.find_trigger_event.
#
# L1: URL pattern blocklist — regex patterns (case-insensitive) tested against
#   the news item's full URL string. A match drops the candidate.
#
# Origin: 2026-05-18 thematic noise audit. ~92% of today's noise events came
# from wired.com lifestyle/coupon paths. Patterns are deliberately path-scoped
# (not domain-wide) because wired.com also publishes legit cyber-incident news
# (e.g. "Cybercriminal Twins Caught After Forgot to Turn Off Microsoft Teams
# Recording") that we don't want to drop.
#
# Maintenance: grow this list when the operator-feedback ledger (deferred —
# see roadmap) flags a recurring noise pattern. Keep patterns specific to
# slug structure (coupon | promo | deals | discount-codes) rather than vague
# topics so legit catalysts aren't accidentally dropped.

url_blocklist:
  # Coupon / promo code pages — empirically the dominant noise class.
  - '(?i)/story/[^/]*-(coupon|promo|promo-code|promo-codes|discount-code|discount-codes)'
  - '(?i)/story/[^/]*-deals?-(this|in|of)-'
  - '(?i)/coupons?/'
  - '(?i)/deals?/'
  # "Best X of YYYY" listicle pattern (Wired/CNET/Engadget heavy users).
  - '(?i)/story/the-?\d+-best-'
  - '(?i)/story/best-[^/]+(-(of|for|in))?-\d{4}'
  # Generic discount / save phrasing in slug.
  - '(?i)/story/[^/]*-(save-\$|save-\d+%|\d+%-off)'

# Source-based gate for ENTITY-LESS catalyst events (catalyst_resolver
# _filter_entityless_events). Entity-less events are eligible BY DEFAULT —
# ~97% are reputable English journalism. They are dropped only when the
# article's GDELT `domain` is listed here OR its `sourcecountry` is in
# `state_media_countries`. Entity-RICH events are never affected. `domain`
# and `sourcecountry` come from the news `extra` JSON, populated only for
# GDELT (RSS/polygon/edgar carry neither, so their entity-less events pass).
#
# Domain match is host-exact or registrable-suffix (host == blocked OR
# host.endswith("." + blocked)), case-insensitive — never substring (so
# rt.com does not match report.com).
state_media_domain_blocklist:
  # US State Dept foreign-mission designated PRC state media:
  - xinhuanet.com
  - news.cn
  - cgtn.com
  - people.com.cn
  - peopledaily.com.cn
  - chinadaily.com.cn
  - globaltimes.cn
  # EU/US-sanctioned Russian state media:
  - rt.com
  - sputniknews.com
  - sputnikglobe.com
  - tass.com
  # observed in AlphaLens production catalyst noise:
  - voc.com.cn
  - 163.com
  - sina.com.cn
  - ifeng.com
  - tmtpost.com
  - bjreview.com

# GDELT `sourcecountry` string values (full English names, verified against
# the live GDELT DOC 2.0 artlist JSON — e.g. "China", "Russia"). Compared
# case-insensitively. Taiwan / Hong Kong are deliberately NOT here.
state_media_countries:
  - China
  - Russia
  - Iran
  - North Korea
  - Belarus
