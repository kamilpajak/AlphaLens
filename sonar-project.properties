sonar.organization=kamilpajak
sonar.projectKey=kamilpajak_AlphaLens
sonar.projectName=AlphaLens

# Source paths (own code only — exclude vendored TradingAgents)
sonar.sources=alphalens,alphalens_cli
sonar.tests=tests
sonar.exclusions=TradingAgents/**,reports/**,data/**,docs/**,launchd/**,scripts/**,.venv/**,**/*.parquet,**/*.yaml

# Python source version
sonar.python.version=3.13

# Coverage from CI
sonar.python.coverage.reportPaths=coverage.xml

# Test report patterns (unittest doesn't emit JUnit by default; coverage suffices)
# sonar.python.xunit.reportPath=test-results.xml

# Source encoding
sonar.sourceEncoding=UTF-8
