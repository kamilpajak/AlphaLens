sonar.organization=kamilpajak
sonar.projectKey=kamilpajak_AlphaLens
sonar.projectName=AlphaLens

# Source paths (own code only — exclude vendored TradingAgents and tests
# from analysis to stay under free-tier LoC limit; coverage still reports
# from coverage.xml since unittest runs against tests/ and writes coverage
# for production code).
sonar.sources=apps/alphalens-research/alphalens_research,apps/alphalens-research/alphalens_cli,apps/alphalens-django,apps/web/src
# Note: tests/ excluded from analysis (free-tier LoC budget). Coverage XML
# still reports test-driven coverage of production code. web/ build artifacts
# and dependencies excluded; only hand-written web/src is analyzed.
sonar.exclusions=TradingAgents/**,reports/**,data/**,docs/**,launchd/**,apps/alphalens-research/scripts/**,.venv/**,**/tests/**,**/migrations/**,apps/web/node_modules/**,apps/web/.svelte-kit/**,apps/web/test-results/**,apps/web/build/**,apps/web/playwright-report/**,**/*.parquet,**/*.yaml

# Python source version
sonar.python.version=3.13

# Coverage from CI
sonar.python.coverage.reportPaths=coverage.xml

# Frontend (TypeScript + Svelte). Svelte has no native SonarCloud parser —
# .ts files in web/src/lib get full AST analysis; .svelte files are analyzed
# heuristically at script-block level. No JS coverage gate yet (no vitest).
sonar.typescript.tsconfigPath=apps/web/tsconfig.json
sonar.javascript.environments=node,browser

# Test report patterns (unittest doesn't emit JUnit by default; coverage suffices)
# sonar.python.xunit.reportPath=test-results.xml

# Source encoding
sonar.sourceEncoding=UTF-8

# Math notation exemption: regression / model code uses canonical capital-X
# design matrix and X_-prefixed variants per Murphy/Hastie convention. S117
# and S1542 (snake_case naming) are false positives in these files.
sonar.issue.ignore.multicriteria=mathvars,mathfns
sonar.issue.ignore.multicriteria.mathvars.ruleKey=python:S117
sonar.issue.ignore.multicriteria.mathvars.resourceKey=apps/alphalens-research/alphalens_research/screeners/**/*.py
sonar.issue.ignore.multicriteria.mathfns.ruleKey=python:S1542
sonar.issue.ignore.multicriteria.mathfns.resourceKey=apps/alphalens-research/alphalens_research/screeners/**/*.py
