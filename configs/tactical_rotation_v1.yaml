# Tactical Sector Rotation — IS baseline v1.1 (2026-04-24, post-consult)
#
# PRE-COMMIT DISCIPLINE (R12 + Perplexity 2026-04-24 consultations):
#   - Thresholds are priors from literature (R12 consultation), not tuned.
#   - v1.1 CHANGE: dropped `yield_inverted` rule after v1.0 IS showed it
#     never fired 2009-2020 — rule would have been a hidden OOS experiment.
#     This is a config change → true_n_tests = 3 (not 2) for Bonferroni.
#   - Do NOT modify this file further. OOS (2021-01-01 → 2026-04-22) is a
#     single-shot evaluation AFTER IS sanity checks pass.
#
# Scope (locked):
#   - Universe: SPY + QQQ + IWM (no SPDR sectors — Perplexity: multiple-testing surface)
#   - Scorer: RuleBasedScorer (no LLM — un-gittable breaks discipline)
#   - Rebalance: quarterly (stride = 63 trading days)

core_weights:
  SPY: 0.60
  QQQ: 0.30
  IWM: 0.10

max_tilt: 0.10           # ±10 percentage points per ticker, per rule

rebalance_stride: 63     # quarterly

etf_spread_bps:
  SPY: 1.0               # tight: Perplexity prior
  QQQ: 2.0
  IWM: 3.0

# 3 rules, capped at 5 by schema validator. Thresholds are priors, not tuned.
# yield_inverted DROPPED in v1.1 (never fired IS 2009-2020, would be unvalidated
# OOS experiment per Perplexity 2026-04-24 follow-up).
rules:
  - name: yield_steep
    signal: yield_curve_slope
    operator: gt
    threshold: 1.0       # 10y − 2y > 100 bps → steepening, growth/cyclical bias
    tilt:
      QQQ: 0.05
      SPY: -0.05

  - name: vix_elevated
    signal: vix_decile
    operator: gt
    threshold: 0.75      # top quartile VIX → defensive, large-cap bias
    tilt:
      SPY: 0.05
      QQQ: -0.05

  - name: qqq_momentum_leads
    signal: qqq_iwm_spread
    operator: gt
    threshold: 0.05      # 6m QQQ total return 5 pp > IWM → megacap regime
    tilt:
      QQQ: 0.05
      IWM: -0.05

gates:
  rolling_sharpe_min: 0.30
  carhart_oos_t_min: 1.50
