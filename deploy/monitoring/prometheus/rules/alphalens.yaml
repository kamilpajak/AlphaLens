---
# AlphaLens cron-observability alert rules.
#
# Loaded by the existing Prometheus container on the VPS. After
# editing, reload via:
#
#     docker exec prometheus kill -HUP 1
#
# Lint locally with:
#
#     promtool check rules deploy/monitoring/prometheus/rules/alphalens.yaml
#
# Pre-merge test coverage at
# ``apps/alphalens-research/tests/test_monitoring_alerts.py``:
#  - YAML well-formed
#  - every job emits has at least one staleness rule
#  - alert thresholds expressed as integer seconds (not human strings)
#  - no duplicate alertname/job combinations
groups:
  - name: alphalens-cron-health
    rules:
      # ---------------------------------------------------------------
      # Staleness — fires when a job has not had a successful run within
      # ~2× its expected cadence. Thresholds are deliberately loose so
      # one transient miss (e.g. SEC EDGAR 503, AV quota burn) does not
      # page the operator; only a sustained outage trips the alert.
      #
      # The ``for: 5m`` clause adds a second debounce so a metric
      # update lagged by the scrape interval cannot flap the alert.
      # ---------------------------------------------------------------

      # Two paired alerts per job, deliberately split (2026-05-31):
      #
      #   * AlphalensJobStale         — fires when the metric EXISTS but
      #     is older than ~2× its cadence. Reports the real staleness
      #     duration via ``humanizeDuration``.
      #   * AlphalensJobMetricMissing — fires when the series is ABSENT
      #     (fresh VPS that never ran the job, textfile-collector
      #     misconfigured, node_exporter unable to read the dir).
      #     Without this guard a missing series silently disables the
      #     staleness alert — the worst class of monitoring blind spot.
      #     Zen pre-merge review of PR #312 pinned the guard.
      #
      # They were a single ``(threshold) or absent()`` rule until a
      # missing metric produced a self-contradictory page: ``absent()``
      # fires with the literal value 1, so the shared
      # ``humanizeDuration`` annotation rendered "stale > 70 days / last
      # run 1s ago" (real incident: monthly job before its first VPS
      # run, 2026-05-31). Splitting lets each failure mode carry an
      # honest, distinct message.
      #
      # Note on grouping: ``absent(metric{job="X"})`` propagates the
      # equality matcher ``job="X"`` onto its 1-element output (only
      # regex matchers get dropped), so the MetricMissing alerts still
      # carry the ``job`` label and group per-job under Alertmanager's
      # ``group_by: [alertname, job]``. Do not "fix" this by adding a
      # label_replace — it is not missing.

      - alert: AlphalensJobStale
        expr: time() - alphalens_job_last_success_timestamp_seconds{job="edgar-detect"} > 1800
        for: 5m
        labels:
          severity: warning
          route: telegram
          unit: edgar-detect
        annotations:
          summary: "edgar-detect stale > 30 min (expected 15-min cadence)"
          description: "Last successful run was {{ $value | humanizeDuration }} ago."

      - alert: AlphalensJobMetricMissing
        expr: absent(alphalens_job_last_success_timestamp_seconds{job="edgar-detect"})
        for: 5m
        labels:
          severity: warning
          route: telegram
          unit: edgar-detect
        annotations:
          summary: "edgar-detect success metric missing"
          description: "No success metric for edgar-detect. The job has not run since metrics were enabled (e.g. a freshly migrated unit before its first run), or the textfile collector / node_exporter scrape is broken. Clears after the first successful run."

      - alert: AlphalensJobStale
        expr: time() - alphalens_job_last_success_timestamp_seconds{job="literature-scan-weekly"} > 1209600
        for: 5m
        labels:
          severity: warning
          route: telegram
          unit: literature-scan-weekly
        annotations:
          summary: "literature-scan-weekly stale > 14 days (expected 7-day cadence)"
          description: "Last successful run was {{ $value | humanizeDuration }} ago."

      - alert: AlphalensJobMetricMissing
        expr: absent(alphalens_job_last_success_timestamp_seconds{job="literature-scan-weekly"})
        for: 5m
        labels:
          severity: warning
          route: telegram
          unit: literature-scan-weekly
        annotations:
          summary: "literature-scan-weekly success metric missing"
          description: "No success metric for literature-scan-weekly. The job has not run since metrics were enabled (e.g. a freshly migrated unit before its first run), or the textfile collector / node_exporter scrape is broken. Clears after the first successful run."

      - alert: AlphalensJobStale
        expr: time() - alphalens_job_last_success_timestamp_seconds{job="literature-scan-monthly"} > 6048000
        for: 5m
        labels:
          severity: warning
          route: telegram
          unit: literature-scan-monthly
        annotations:
          summary: "literature-scan-monthly stale > 70 days (expected 30-day cadence)"
          description: "Last successful run was {{ $value | humanizeDuration }} ago."

      - alert: AlphalensJobMetricMissing
        expr: absent(alphalens_job_last_success_timestamp_seconds{job="literature-scan-monthly"})
        for: 5m
        labels:
          severity: warning
          route: telegram
          unit: literature-scan-monthly
        annotations:
          summary: "literature-scan-monthly success metric missing"
          description: "No success metric for literature-scan-monthly. The job has not run since metrics were enabled (e.g. a freshly migrated unit before its first run), or the textfile collector / node_exporter scrape is broken. Clears after the first successful run."

      - alert: AlphalensJobStale
        expr: time() - alphalens_job_last_success_timestamp_seconds{job="av-earnings-backfill"} > 172800
        for: 5m
        labels:
          severity: warning
          route: telegram
          unit: av-earnings-backfill
        annotations:
          summary: "av-earnings-backfill stale > 48h (expected daily cadence)"
          description: "Last successful run was {{ $value | humanizeDuration }} ago."

      - alert: AlphalensJobMetricMissing
        expr: absent(alphalens_job_last_success_timestamp_seconds{job="av-earnings-backfill"})
        for: 5m
        labels:
          severity: warning
          route: telegram
          unit: av-earnings-backfill
        annotations:
          summary: "av-earnings-backfill success metric missing"
          description: "No success metric for av-earnings-backfill. The job has not run since metrics were enabled (e.g. a freshly migrated unit before its first run), or the textfile collector / node_exporter scrape is broken. Clears after the first successful run."

      # thematic-build moved from 1×/day → 6×/day (every 4h at HH:30
      # UTC) in PR-F (epic #295, issue #300). 43200s = 12h = 3× the
      # 4h interval — DELIBERATELY asymmetric vs the other 4 services
      # which use 2× cadence. Justification: a thematic run is
      # 15-20 min wall time and each Gemini Pro/Flash stage can take
      # 5-10 min of API latency on its own. A 2× threshold (8h) would
      # page on one transient Gemini RPM blip; 3× gives one missed
      # slot's worth of slack while still surfacing two consecutive
      # misses within half a day. Pinned by PR-F zen pre-merge review.
      - alert: AlphalensJobStale
        expr: time() - alphalens_job_last_success_timestamp_seconds{job="thematic-build"} > 43200
        for: 5m
        labels:
          severity: warning
          route: telegram
          unit: thematic-build
        annotations:
          summary: "thematic-build stale > 12h (expected 4h cadence)"
          description: "Last successful run was {{ $value | humanizeDuration }} ago."

      - alert: AlphalensJobMetricMissing
        expr: absent(alphalens_job_last_success_timestamp_seconds{job="thematic-build"})
        for: 5m
        labels:
          severity: warning
          route: telegram
          unit: thematic-build
        annotations:
          summary: "thematic-build success metric missing"
          description: "No success metric for thematic-build. The job has not run since metrics were enabled (e.g. a freshly migrated unit before its first run), or the textfile collector / node_exporter scrape is broken. Clears after the first successful run."

      # feedback-shadow-returns runs nightly at 06:30 UTC (Track A v2
      # PR-T). 172800s = 48h = 2× the daily cadence, matching
      # av-earnings-backfill. The sweep exits 0 even on nights that price
      # 0 matured dates (per-ticker resilience), so last_success refreshes
      # every night — staleness here cleanly catches "the nightly sweep
      # stopped running", which the exit-code AlphalensJobFailed cannot.
      # NOT trading-day-gated (unlike the paper jobs), so no weekend
      # false-page concern.
      - alert: AlphalensJobStale
        expr: time() - alphalens_job_last_success_timestamp_seconds{job="feedback-shadow-returns"} > 172800
        for: 5m
        labels:
          severity: warning
          route: telegram
          unit: feedback-shadow-returns
        annotations:
          summary: "feedback-shadow-returns stale > 48h (expected daily cadence)"
          description: "Last successful run was {{ $value | humanizeDuration }} ago."

      - alert: AlphalensJobMetricMissing
        expr: absent(alphalens_job_last_success_timestamp_seconds{job="feedback-shadow-returns"})
        for: 5m
        labels:
          severity: warning
          route: telegram
          unit: feedback-shadow-returns
        annotations:
          summary: "feedback-shadow-returns success metric missing"
          description: "No success metric for feedback-shadow-returns. The job has not run since metrics were enabled (e.g. a freshly installed unit before its first run), or the textfile collector / node_exporter scrape is broken. Clears after the first successful run."

      # ---------------------------------------------------------------
      # VIX regime-cache freshness (Track A v2 PR-2 follow-up).
      # ---------------------------------------------------------------
      #
      # The Django feedback POST path stamps ``market_regime_at_entry`` from
      # ``alphalens_feedback.regime.get_cached_vix``, which silently returns
      # ``None`` (→ regime degrades to "unknown") once the cache ages past the
      # 96h reader ceiling (``_VIX_MAX_AGE_SECONDS``). The refresh step in
      # run_thematic_day.sh is best-effort (``|| echo WARN``), so a persistently
      # dead FRED refresher produces NO signal on its own — every new decision
      # quietly loses its regime label and the per-regime execution-mode cells
      # (PR-4/PR-5) get poisoned at the source. ``alphalens cache refresh-vix``
      # now emits ``alphalens_vix_cache_fetched_at_timestamp_seconds`` (a GAUGE:
      # the epoch the cache was written) so these two rules can alert.
      #
      # This is NOT a cron systemd unit — the refresh runs INLINE in the
      # thematic build — so the rules carry a DISTINCT alertname and NO
      # ``job=`` label, keeping them out of the per-job cron enumerations
      # (ACTIVE_JOBS / staleness-threshold dict / ExecStopPost emit-hook
      # parity). Same Stale/MetricMissing split as the job alerts: only Stale
      # renders a duration (``absent()`` fires with value 1 → a misleading
      # "1s ago" if humanizeDuration were on the missing-metric alert).
      #
      # 259200s = 72h = 0.75× the 96h reader ceiling, so the alert fires ~24h
      # BEFORE the reader starts degrading stamps to "unknown" — giving the
      # operator a day of runway to fix a dead FRED refresher while the cache is
      # still fresh enough to stamp a real regime, rather than paging only after
      # the damage is done. The refresh runs ~6×/day, so 72h = 18 consecutive
      # missed runs — unambiguously a dead refresher, no transient-miss false
      # page. fetched_at is rewritten every successful run (even when FRED has
      # no new observation), so weekends do not age it. ``{series="VIXCLS"}``
      # scopes both rules to the one series we depend on. GAUGE → threshold on
      # ``time() - metric`` / ``absent()``, never increase()/rate() (the
      # AlphalensEdgarNoCandidates24h lesson).
      - alert: AlphalensVixCacheStale
        expr: time() - alphalens_vix_cache_fetched_at_timestamp_seconds{series="VIXCLS"} > 259200
        for: 5m
        labels:
          severity: warning
          route: telegram
          unit: vix-cache-refresh
        annotations:
          summary: "VIX regime cache stale > 72h (refreshed ~6x/day)"
          description: "Last VIX cache refresh was {{ $value | humanizeDuration }} ago. Fix before 96h or new feedback decisions start stamping market_regime_at_entry='unknown'. Check the refresh-vix step in `journalctl --user -u alphalens-thematic-build.service` on the VPS (FRED_API_KEY / FRED outage)."

      - alert: AlphalensVixCacheMetricMissing
        expr: absent(alphalens_vix_cache_fetched_at_timestamp_seconds{series="VIXCLS"})
        for: 5m
        labels:
          severity: warning
          route: telegram
          unit: vix-cache-refresh
        annotations:
          summary: "VIX regime cache freshness metric missing"
          description: "No VIX cache freshness metric. The refresh-vix step has not succeeded since metrics were enabled, or the textfile collector / node_exporter scrape is broken. New feedback decisions risk stamping market_regime_at_entry='unknown'. Clears after the first successful refresh."

      # ---------------------------------------------------------------
      # Failure — fires on any non-zero exit. Hard fail, immediate
      # debounce (1m so one cron failure does not wait 5m to page).
      # ---------------------------------------------------------------

      # ``for: 5m`` matches the staleness debounce — a one-off
      # SEC EDGAR 503 (5xx is normal background noise) flips
      # ``last_exit_code`` to non-zero for one scrape but the next
      # 15-min retry usually clears it. A 1m debounce would page on
      # that transient; 5m makes us wait for sustained failure.
      # Zen pre-merge review of PR #312 flagged this trade-off.
      - alert: AlphalensJobFailed
        expr: alphalens_job_last_exit_code != 0
        for: 5m
        labels:
          severity: critical
          route: telegram
        annotations:
          summary: "{{ $labels.job }} exited with code {{ $value }}"
          description: "Check `journalctl --user -u alphalens-{{ $labels.job }}.service` on the VPS."

      # ---------------------------------------------------------------
      # Domain alerts — surface "ran clean, found nothing" conditions
      # that an exit-code check would miss.
      # ---------------------------------------------------------------

      # The edgar detector usually finds 1-3 candidates per day on the
      # held + watchlist tickers. Zero candidates for 24h is more
      # likely a portfolio.yaml regression (empty file slipped past
      # the bounds-check) than a quiet news day. ``for: 1h`` debounces
      # a quiet morning vs a real stuck portfolio.
      #
      # ``alphalens_edgar_events_dispatched_total`` is a GAUGE that
      # the emitter overwrites with the current run's count on every
      # fire (per ``observability/textfile.py`` design note). So
      # ``increase()`` is wrong here — it is a counter function that
      # assumes monotonic non-decreasing series; on a gauge it
      # returns nonsense. The correct semantic for "zero candidates
      # across every run in the last 24h" is ``max_over_time(...)
      # == 0`` — the maximum value the gauge took on across the
      # window. Zen pre-merge review of PR #312 caught this gauge-vs-
      # counter mismatch.
      - alert: AlphalensEdgarNoCandidates24h
        expr: max_over_time(alphalens_edgar_events_dispatched_total[24h]) == 0
        for: 1h
        labels:
          severity: info
          route: telegram
        annotations:
          summary: "edgar-detect found 0 candidates in last 24h"
          description: "Verify ~/.alphalens/edgar-detect/portfolio.yaml is non-empty."

      # AV free-tier quota = 25 calls/day. ``quota_remaining < 3`` flags
      # the operator before the backfill cron silently runs out before
      # a high-value ticker; gives ~3 hours of buffer to react.
      - alert: AlphalensAvQuotaLow
        expr: alphalens_av_quota_remaining < 3
        for: 5m
        labels:
          severity: info
          route: telegram
        annotations:
          summary: "Alpha Vantage quota almost exhausted ({{ $value }} calls left)"
          description: "Quota resets at 00:00 UTC. PEAD-v2 backfill may stall."

      # ---------------------------------------------------------------
      # Thematic output-volume dead-man-switch (test-strategy Phase 4).
      # ---------------------------------------------------------------
      #
      # The L3 golden-replay tests catch a pipeline regression in CI.
      # These rules catch what no hermetic test can: a LIVE LLM model
      # retiring next month (DeepSeek Flash 404 per news item) so a stage
      # produces 0 rows from non-empty input while the run still exits 0
      # — the silent-success-noop class (incident #3, the retired-Gemini
      # empty brief). Each thematic stage emits an input/output gauge pair
      # ``alphalens_thematic_stage_{input,output}_rows{stage="..."}`` from
      # inside the pipeline container (the bind-mounted HOME lands the
      # textfile on the host node_exporter dir).
      #
      # Gauge-correct aggregation: the stage gauges are OVERWRITTEN each
      # run, so increase()/rate() return nonsense (the
      # AlphalensEdgarNoCandidates24h lesson, PR #312). The right operator
      # for "produced nothing across every run in the window" is
      # ``max_over_time``. After max_over_time strips ``__name__``, the
      # input and output vectors share only ``{stage}`` so the ``and``
      # matches per-stage — which is exactly why the gauges are
      # co-located on the same stage label rather than inferred across a
      # cross-series join.
      #
      # ``for: 1h`` debounce — one quiet fire (a stage legitimately empty
      # for a single 4-hourly run) must not page; a stage that is empty
      # across the whole 24h window despite non-empty input is the signal.
      - alert: AlphalensThematicStageZeroOutput
        expr: |
          max_over_time(alphalens_thematic_stage_output_rows[24h]) == 0
          and
          max_over_time(alphalens_thematic_stage_input_rows[24h]) > 0
        for: 1h
        labels:
          severity: critical
          route: telegram
          unit: thematic-build
        annotations:
          summary: "thematic stage {{ $labels.stage }} produced 0 rows from non-empty input (24h)"
          description: "Silent-success noop: input present, output empty across every run in 24h. Likely an LLM model retirement / API contract break. Check `journalctl --user -u alphalens-thematic-build.service` on the VPS."

      # Partial-degradation catch: today's brief output collapsed to <34%
      # (~3x drop) of its own 7-day median. Distinct from the zero-output
      # rule — catches a quota throttle / partial model failure that still
      # produces *some* briefs. The ``>= 3`` median guard suppresses
      # cold-start false pages until a real baseline accrues (the series
      # is brand-new, so it stays quiet ~7 days). Thresholds are
      # first-guess; tune after 2-3 weeks of real baseline. Brief-only:
      # the user-visible terminal output; per-stage anomaly would add
      # cold-start noise for little gain.
      - alert: AlphalensThematicBriefVolumeAnomaly
        expr: |
          alphalens_thematic_stage_output_rows{stage="brief"}
          <
          0.34 * quantile_over_time(0.5, alphalens_thematic_stage_output_rows{stage="brief"}[7d] offset 1h)
          and
          quantile_over_time(0.5, alphalens_thematic_stage_output_rows{stage="brief"}[7d] offset 1h) >= 3
        for: 6h
        labels:
          severity: warning
          route: telegram
          unit: thematic-build
        annotations:
          summary: "thematic brief volume {{ $value }} is <34% of 7-day median"
          description: "Brief output collapsed vs baseline (not zero). Possible partial LLM / quota degradation. Check the daily thematic-build logs."

      # ---------------------------------------------------------------
      # Structured-event-template health (epic #321 PR-1).
      # ---------------------------------------------------------------
      #
      # ``AlphalensTemplateMatchRateLow`` fires when a SPECIFIC template
      # drops below 20% match-rate over a rolling 7-day window. The
      # aggregate template_match_rate across all 5 dnia-jeden templates
      # is expected to sit in the 20-35% range for the first months
      # (design memo §1.1) — alerting on aggregate would be noisy.
      # Per-template lets the operator catch pattern rot in one template
      # without burning attention on the expected steady-state aggregate.
      #
      # ``for: 1d`` debounce — a single quiet news day on a niche
      # template (e.g. regulatory_action when there's no FDA panel that
      # week) should not page; sustained drift is the signal.
      #
      # Guard against judging the match rate on too few attempts. A
      # brand-new or low-traffic template (e.g. 1 attempt / 0 match over
      # the window) would otherwise trip a 7-day low-match-rate page on
      # statistically meaningless volume. Require an absolute minimum of
      # 50 attempts over the 7-day window before the rate clause counts;
      # ``increase()`` gives the total count (not the per-second rate, so
      # a single attempt no longer satisfies the old ``rate(...) > 0``
      # guard). This also keeps the zero-denominator division safe — no
      # series is produced until the min-sample clause passes.
      - alert: AlphalensTemplateMatchRateLow
        expr: |
          (sum by (template_id) (rate(alphalens_template_match_total[7d]))
           /
           sum by (template_id) (rate(alphalens_template_attempt_total[7d])))
          < 0.20
          and
          sum by (template_id) (increase(alphalens_template_attempt_total[7d])) >= 50
        for: 1d
        labels:
          severity: warning
          route: telegram
        annotations:
          summary: "Template {{ $labels.template_id }} match rate < 20% for 7 days"
          description: "Per-template match-rate sustained below 20% — review pattern in templates/{{ $labels.template_id }}.yaml or accept drift via `alphalens templates evaluate`."
