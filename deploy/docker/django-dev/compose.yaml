services:
  postgres:
    image: postgres:16-alpine
    container_name: alphalens-postgres-dev
    environment:
      POSTGRES_USER: alphalens
      POSTGRES_PASSWORD: alphalens
      POSTGRES_DB: alphalens
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - alphalens_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U alphalens"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

volumes:
  alphalens_pgdata:
