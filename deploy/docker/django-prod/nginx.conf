# nginx config for the AlphaLens prod stack.
#
# Two responsibilities:
#   1. Serve the SvelteKit SPA from /usr/share/nginx/html
#   2. Reverse-proxy /api/* to the Django container at django:8000
#
# Everything sits behind a Cloudflare tunnel in production, so we trust
# the X-Forwarded-* headers Cloudflare sets and skip TLS termination here.

upstream django_upstream {
    server django:8000;
    keepalive 8;
}

server {
    listen 80 default_server;
    server_name _;

    # SPA shell — fall back to index.html so client-side routes resolve.
    root /usr/share/nginx/html;
    index index.html;

    # Long-lived caching for fingerprinted assets; SvelteKit puts those
    # under _app/ with content-hash filenames.
    location /_app/ {
        access_log off;
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # The api lives at /api/* on the public origin and is rewritten to
    # the upstream root (Django doesn't know about the /api prefix —
    # that's a same-origin proxy artifact, not part of the contract).
    location /api/ {
        # Strip the /api prefix when forwarding.
        rewrite ^/api/(.*)$ /$1 break;

        proxy_pass http://django_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_set_header Connection "";
        proxy_pass_request_headers on;

        # 10s is generous for the read-only briefs API; stats queries
        # over ~years of data top out around 200ms in practice.
        proxy_read_timeout 10s;
        proxy_send_timeout 10s;
    }

    # Bare /healthz and /readyz proxy to Django so platform liveness
    # checks (Kubernetes, Cloudflare load balancer health) work without
    # going through /api.
    location ~ ^/(healthz|readyz)$ {
        proxy_pass http://django_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        access_log off;
    }

    # Catch-all → SPA index, so /briefs, /brief/<date>, /about all hit
    # SvelteKit's client-side router.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
