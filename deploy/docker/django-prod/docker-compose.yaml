# Production-shaped stack for the AlphaLens briefs UI + API.
#
# Topology:
#
#   nginx ────────────────────► django ────► postgres
#     │                                │
#     ├─ serves apps/web/build/ static     └─ reads ~/.alphalens/thematic_briefs
#     └─ proxies /api/* → django:8000     via a host bind-mount (read-only)
#
# Bring up the stack from the repo root:
#
#   cp deploy/docker/django-prod/.env.example deploy/docker/django-prod/.env
#   # fill in SECRET_KEY, CF_ACCESS_TEAM, CF_ACCESS_AUD, ALLOWED_HOSTS
#   docker compose -f deploy/docker/django-prod/docker-compose.yaml up -d
#
# One-shot DB sync from parquet:
#
#   docker compose -f deploy/docker/django-prod/docker-compose.yaml run --rm rebuild-cache

name: alphalens-prod

x-django-base: &django-base
  build:
    context: ../../..
    dockerfile: deploy/docker/django-prod/Dockerfile
  image: alphalens-django:latest
  env_file: ./.env
  environment:
    DATABASE_URL: postgres://alphalens:${POSTGRES_PASSWORD:?set in .env}@postgres:5432/alphalens
    DJANGO_SETTINGS_MODULE: ${DJANGO_SETTINGS_MODULE:-config.settings.prod}
  depends_on:
    postgres:
      condition: service_healthy
  volumes:
    # Read-only mount of the host's brief output so the API + rebuild
    # command see the same artifact path as the daily pipeline. Operator
    # may override BRIEFS_DIR in .env to point at a different snapshot.
    - ${BRIEFS_DIR:-${HOME}/.alphalens/thematic_briefs}:/var/lib/alphalens/thematic_briefs:ro

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: alphalens
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set in .env}
      POSTGRES_DB: alphalens
    volumes:
      - alphalens_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U alphalens"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  django:
    <<: *django-base
    # Migrate on every start. Idempotent; new migrations apply, no-ops on
    # established schema. Cheap enough not to need an init container.
    command:
      - sh
      - -c
      - >-
        python manage.py migrate --noinput &&
        exec gunicorn
        --bind 0.0.0.0:8000
        --workers 2
        --worker-class uvicorn.workers.UvicornWorker
        --access-logfile -
        --error-logfile -
        config.asgi:application
    expose:
      - "8000"
    restart: unless-stopped

  # One-shot service for the daily parquet→Postgres sync. Not started by
  # ``up``; invoke via ``docker compose run --rm rebuild-cache``. Wired as
  # a separate service (not exec into ``django``) so an external scheduler
  # can drive it (systemd timer on the host, or cron in a sidecar).
  rebuild-cache:
    <<: *django-base
    profiles: ["maintenance"]
    command:
      - python
      - manage.py
      - rebuild_briefs_cache
      - --briefs-dir
      - /var/lib/alphalens/thematic_briefs

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - django
    ports:
      - "${NGINX_HTTP_PORT:-8080}:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      # Operator builds the SPA on the host (``pnpm build`` in web/) and
      # ships the static artifact via this bind. Cloudflare Pages is the
      # alternate path; in that case nginx only serves the API proxy.
      - ${SPA_DIST:-../../../apps/web/build}:/usr/share/nginx/html:ro
    restart: unless-stopped

volumes:
  alphalens_pgdata:
