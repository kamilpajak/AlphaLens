# AlphaLens VPS deployment.
#
# `docker compose up -d` starts the web + api services. The pipeline service
# lives under the `oneshot` profile and is invoked on demand from systemd:
#   docker compose run --rm pipeline /app/deploy/docker/run_thematic_day.sh
#
# All images build from the repo checkout at the VPS — no external registry.
# The api service reuses the pipeline image (FastAPI + uvicorn ship in the
# main dependency set), overriding the entrypoint to launch uvicorn.

services:
  web:
    build:
      context: ../../web
      dockerfile: Dockerfile
    image: alphalens-web:latest
    container_name: alphalens-web
    restart: unless-stopped
    ports:
      # Bind to localhost only — Cloudflare tunnel / reverse proxy on the
      # host fronts the public surface. Briefs reach the SPA via the
      # `api` service over the docker-compose default network; nginx in
      # this container proxies `/api/` → `http://api:8000/`.
      # 8080 is occupied by CrowdSec local API on this VPS; 8085 is the
      # next free slot in the reserved production range per /home/jacoren/CLAUDE.md.
      - "127.0.0.1:8085:80"

  pipeline:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.pipeline
    image: alphalens-pipeline:latest
    profiles: [oneshot]
    # Host UID/GID so files written into bind-mounts are owned by the
    # operator, not root.
    user: "${UID:-1000}:${GID:-1000}"
    environment:
      # alphalens.* resolves cache paths via Path.home(); HOME must point
      # at the bind-mount target so writes land in ~/.alphalens on host.
      HOME: /app/home
    env_file:
      - .env
    volumes:
      - ${HOME}/.alphalens:/app/home/.alphalens

  api:
    # Reuses the pipeline image — fastapi + uvicorn ship in the project's
    # main dependencies, so no separate Dockerfile is needed. The `build:`
    # block matches the pipeline service so `docker compose up api` cold
    # (without a prior `docker compose build pipeline`) still works.
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.pipeline
    image: alphalens-pipeline:latest
    container_name: alphalens-api
    restart: unless-stopped
    user: "${UID:-1000}:${GID:-1000}"
    env_file:
      # Symmetry with the pipeline service so future env-only knobs (log
      # level, JWT verifier secrets) reach the container without another
      # compose edit. Empty .env is fine.
      - .env
    environment:
      HOME: /app/home
      # Cache db path inside the container — bind-mount resolves it to
      # ${HOME}/.alphalens/api/briefs.db on the host. Pipeline's daily run
      # rebuilds this file via `alphalens api rebuild-cache`.
      ALPHALENS_CACHE_DB: /app/home/.alphalens/api/briefs.db
      # Browser origins allowed to call the API. The deployed origin lands
      # via Cloudflare Tunnel; the localhost entries cover SvelteKit dev.
      CORS_ORIGINS: "${API_CORS_ORIGINS:-http://localhost:5173,http://localhost:8085}"
      # nginx in the web container reverse-proxies ``/api/*`` → ``api:8000/*``
      # (stripping the prefix). FastAPI needs ``root_path=/api`` to emit
      # absolute URLs (Swagger UI, OpenAPI ``servers``) that travel back
      # through that prefix. Without this, ``/api/docs`` renders empty
      # because Swagger UI fetches the root-relative ``/openapi.json``
      # and gets the SvelteKit SPA fallback HTML instead of the schema.
      ALPHALENS_ROOT_PATH: /api
    volumes:
      # Read-only — the api opens SQLite with `?mode=ro&immutable=1` (see
      # `alphalens/api/db.py`), which lets it serve traffic from a `:ro`
      # mount where SQLite cannot create `-wal`/`-shm` sidecars. The
      # pipeline runs in a sibling container that mounts the same path
      # RW and checkpoints the WAL before exit. Net effect: a compromised
      # api process cannot corrupt the cache or write elsewhere under
      # ~/.alphalens.
      - ${HOME}/.alphalens:/app/home/.alphalens:ro
    ports:
      # Bind to localhost only — Cloudflare Access (Tunnel + policy) fronts
      # the public surface. NEVER change this to 0.0.0.0:8086 — that would
      # silently bypass every Access policy. See
      # deploy/cloudflare/access_setup.md.
      # 8081 is occupied by gridscribe (Gridfinity Label Generator) on this
      # VPS; 8086 is the next free slot in the 8085-8089 production range.
      - "127.0.0.1:8086:8000"
    entrypoint:
      - /app/.venv/bin/alphalens
    command:
      - api
      - serve
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --db
      - /app/home/.alphalens/api/briefs.db
    healthcheck:
      test:
        - CMD
        - /app/.venv/bin/python
        - -c
        - "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/healthz',timeout=2).status==200 else 1)"
      interval: 30s
      timeout: 3s
      # 15s buys margin for uvicorn cold start on a small VPS — the local
      # Mac smoke ran ~12s wall before the first probe returned 200.
      start_period: 15s
      retries: 3
