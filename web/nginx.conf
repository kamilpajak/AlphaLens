server {
    listen 80 default_server;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # gzip on text-y mime types — Cloudflare in front will re-compress with
    # brotli, but compressing at the origin saves intra-network bytes too.
    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # Immutable hashed assets — safe for long cache. SvelteKit emits these
    # under /_app/immutable/ with content hashes in the filename.
    location /_app/immutable/ {
        add_header Cache-Control "public, max-age=2592000, immutable";
        try_files $uri =404;
    }

    # Pipeline-rewritten JSON. MUST be no-cache so a new brief surfaces
    # within minutes of the systemd timer firing, not after browser cache
    # eviction. Kept in parallel with /api/ until PR 4 deprecates the
    # static-JSON exporter so we have a rollback path during stabilisation.
    location /data/ {
        add_header Cache-Control "no-cache, must-revalidate";
        try_files $uri =404;
    }

    # REST API reverse proxy. The trailing slashes on both `location` and
    # `proxy_pass` matter: nginx strips the `/api/` prefix before forwarding
    # so `/api/v1/days` reaches the upstream as `/v1/days`. Resolved via
    # the docker-compose `default` network — the api service is on the
    # same network as web. No cache header so browsers always see fresh
    # data; the api itself is fast (<5ms p99 against the SQLite cache).
    location /api/ {
        proxy_pass http://api:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_read_timeout 30s;
        # Strip any upstream Cache-Control then assert our own — otherwise
        # nginx's add_header would stack on top and the browser sees two
        # values, which is provider-dependent behaviour we don't want.
        proxy_hide_header Cache-Control;
        add_header Cache-Control "no-cache" always;
    }

    # SPA fallback for every other path. The client-side router takes over
    # and renders the matching route (or SvelteKit's 404 error page).
    location / {
        add_header Cache-Control "no-cache";
        try_files $uri $uri/ /index.html;
    }
}
