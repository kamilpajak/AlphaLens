# Dependabot — security alerts + version-update PRs.
#
# Three ecosystems live in this repo: uv (the root Python workspace, 4
# members), npm (apps/web/ SvelteKit + Tailwind), github-actions (pins).
# Security alerts fire continuously regardless of the schedule below; the
# `schedule` knobs control cadence of non-security version-update PRs only.
# Update PRs target the default branch (main); no `target-branch:` override.

version: 2
updates:
  # ---------------------------------------------------------------------
  # Python — uv workspace lives at repo root (pyproject.toml + uv.lock).
  # Uses the dedicated `uv` ecosystem (GA Dec 2025) so Dependabot updates
  # BOTH pyproject.toml AND uv.lock in the same PR. The old `pip` ecosystem
  # only edited pyproject.toml and left uv.lock stale, so every PR failed
  # CI on `uv lock --check` and had to be recreated by hand.
  # NOTE: uv-ecosystem support is still maturing and some setups (uv
  # workspaces + PEP 735 dependency-groups, both used here) are not yet
  # explicitly confirmed, so the CI `uv lock --check` gate stays as a
  # backstop. Docs: https://docs.astral.sh/uv/guides/integration/dependabot/
  # ---------------------------------------------------------------------
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Warsaw"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "python"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    groups:
      # Group minor + patch bumps to reduce PR noise; majors stay separate.
      python-minor-and-patch:
        update-types:
          - "minor"
          - "patch"

  # ---------------------------------------------------------------------
  # Frontend — pnpm-lock.yaml is the source of truth in apps/web/.
  # ---------------------------------------------------------------------
  - package-ecosystem: "npm"
    directory: "/apps/web"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:30"
      timezone: "Europe/Warsaw"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "frontend"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    groups:
      npm-minor-and-patch:
        update-types:
          - "minor"
          - "patch"

  # ---------------------------------------------------------------------
  # GitHub Actions — version pins for action steps in workflows.
  # ---------------------------------------------------------------------
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      # For `interval: monthly`, Dependabot fires on the first occurrence
      # of the specified weekday of the month — NOT a day-of-month number
      # (which is what `day: "1"` was; rejected by the schema validator).
      interval: "monthly"
      day: "monday"
      time: "07:00"
      timezone: "Europe/Warsaw"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
