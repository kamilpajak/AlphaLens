# Dependabot — security alerts + version-update PRs.
#
# Three ecosystems live in this repo: pip (the root Python workspace, 4
# members), npm (apps/web/ SvelteKit + Tailwind), github-actions (pins).
# Security alerts fire continuously regardless of the schedule below; the
# `schedule` knobs control cadence of non-security version-update PRs only.
# Update PRs target the default branch (main); no `target-branch:` override.

version: 2
updates:
  # ---------------------------------------------------------------------
  # Python — uv workspace lives at repo root (pyproject.toml + uv.lock).
  # Uses the `pip` ecosystem ON PURPOSE: it edits the version constraints in
  # pyproject.toml (the source of truth uv resolves from) and leaves uv.lock
  # for us to regenerate. The `.github/workflows/dependabot-uv-relock.yml`
  # workflow then runs `uv lock` on the PR and pushes the synced lockfile back,
  # so `uv lock --check` passes automatically — no manual recreate.
  # Why not the `uv` ecosystem: it writes the new constraint into uv.lock's
  # requires-dist but NOT pyproject.toml, which also fails `uv lock --check`
  # and is the WRONG direction for auto-relock (running `uv lock` would revert
  # the bump, since uv reads pyproject.toml as truth). See dependabot-core
  # #12788. The CI `uv lock --check` gate stays as the backstop if the
  # auto-relock workflow is ever disabled or its token is missing.
  # ---------------------------------------------------------------------
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Warsaw"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "python"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    groups:
      # Group minor + patch bumps to reduce PR noise; majors stay separate.
      python-minor-and-patch:
        update-types:
          - "minor"
          - "patch"

  # ---------------------------------------------------------------------
  # Frontend — pnpm-lock.yaml is the source of truth in apps/web/.
  # ---------------------------------------------------------------------
  - package-ecosystem: "npm"
    directory: "/apps/web"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:30"
      timezone: "Europe/Warsaw"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "frontend"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    groups:
      npm-minor-and-patch:
        update-types:
          - "minor"
          - "patch"

  # ---------------------------------------------------------------------
  # GitHub Actions — version pins for action steps in workflows.
  # ---------------------------------------------------------------------
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      # For `interval: monthly`, Dependabot fires on the first occurrence
      # of the specified weekday of the month — NOT a day-of-month number
      # (which is what `day: "1"` was; rejected by the schema validator).
      interval: "monthly"
      day: "monday"
      time: "07:00"
      timezone: "Europe/Warsaw"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
