# Dependabot — security alerts + version-update PRs.
#
# Three ecosystems live in this repo: pip (3 Python workspace members),
# npm (apps/web/ SvelteKit + Tailwind), github-actions (workflow pins).
# Security alerts fire continuously regardless of the schedule below; the
# `schedule` knobs control cadence of non-security version-update PRs only.
#
# `target-branch: feature/django-migration` — main is parked pending the
# VPS shadow-deploy comparison test (see ADR 0009 / ADR 0011), so every
# automated update stacks onto the same long-lived feature branch as the
# rest of the workspace-split work.

version: 2
updates:
  # ---------------------------------------------------------------------
  # Python — uv workspace lives at repo root (pyproject.toml + uv.lock).
  # The pip ecosystem reads pyproject.toml directly; uv.lock pin updates
  # are picked up via Dependabot's uv support (rolled out late 2025).
  # ---------------------------------------------------------------------
  - package-ecosystem: "pip"
    directory: "/"
    target-branch: "feature/django-migration"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Warsaw"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "python"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    groups:
      # Group minor + patch bumps to reduce PR noise; majors stay separate.
      python-minor-and-patch:
        update-types:
          - "minor"
          - "patch"

  # ---------------------------------------------------------------------
  # Frontend — pnpm-lock.yaml is the source of truth in apps/web/.
  # ---------------------------------------------------------------------
  - package-ecosystem: "npm"
    directory: "/apps/web"
    target-branch: "feature/django-migration"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:30"
      timezone: "Europe/Warsaw"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "frontend"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    groups:
      npm-minor-and-patch:
        update-types:
          - "minor"
          - "patch"

  # ---------------------------------------------------------------------
  # GitHub Actions — version pins for action steps in workflows.
  # ---------------------------------------------------------------------
  - package-ecosystem: "github-actions"
    directory: "/"
    target-branch: "feature/django-migration"
    schedule:
      interval: "monthly"
      day: "1"
      time: "07:00"
      timezone: "Europe/Warsaw"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
