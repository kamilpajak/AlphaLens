name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 2 * * 1"  # Weekly Monday 02:00 UTC — detect dependency drift
  workflow_dispatch: {}  # manual trigger (e.g. re-run live-probes after fixing a vendor)

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # -----------------------------------------------------------------------
  # Python tier — covers BOTH apps/alphalens-pipeline (live infra +
  # watchdog + thematic + literature_review + CLI) and apps/alphalens-
  # research (screeners + backtest + attribution + paper_trade + etc.).
  # Single job because the test files all live under apps/alphalens-
  # research/tests/ (workspace install lets them import either package).
  # Runs on Linux: lightgbm ships manylinux wheels (OpenMP via libgomp1,
  # preinstalled on ubuntu-latest) so no brew/libomp step is needed; Linux
  # also matches the production runtime (VPS / runpod / Django Docker) and
  # costs ~10x less per minute than macOS runners.
  # -----------------------------------------------------------------------
  research:
    name: research (Python)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0  # full history for SonarCloud blame + coverage

      - name: Set up Python via uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.13"
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install workspace
        run: uv sync --group dev --frozen

      - name: Lockfile freshness (uv.lock matches pyproject)
        # Frozen-deps drift gate: if anyone edits pyproject.toml without
        # regenerating uv.lock, this fails. `uv lock --check` is the 2026
        # canonical way to assert "the lockfile is up to date" without
        # actually writing to disk.
        run: uv lock --check

      - name: Ruff lint (pipeline + research)
        # Blocking. Pre-existing warnings cleaned up in the foundation-
        # cleanup PR (chore/ci-foundation-cleanup); future violations must
        # be fixed in the PR that introduces them. Per-file-ignores +
        # project-wide `ignore = [...]` in pyproject.toml encode the
        # research-code posture (PLR0911 verdict ladders, capital-X math
        # notation in screeners, Polish-language docstrings, etc).
        run: uv run ruff check apps/alphalens-pipeline/ apps/alphalens-research/

      - name: Ruff format check (pipeline + research)
        run: uv run ruff format --check apps/alphalens-pipeline/ apps/alphalens-research/

      - name: Bandit security scan
        # Gate: low-and-above severity (-ll). XML parsing on untrusted SEC
        # EDGAR feeds uses defusedxml (B314 fix); urllib3 calls go through
        # the canonical requests-based vendor clients (sec_edgar_client,
        # alphavantage_client, polygon_client). The single
        # urllib.request.urlopen call to GDELT is # nosec B310 — URL built
        # from a constant base + querystring, file:// not reachable.
        run: uv run bandit -r apps/alphalens-pipeline/alphalens_pipeline/ apps/alphalens-pipeline/alphalens_cli/ apps/alphalens-research/alphalens_research/ -ll -q

      - name: pip-audit (CVE scan against uv.lock)
        # uv export --no-emit-workspace strips editable installs of the
        # three workspace members (they have no PyPI CVEs to look up).
        # The grep drops git-URL deps (phase-robust-backtesting) — pip-audit
        # can't audit a git ref. --disable-pip uses osv.dev directly so we
        # don't need an ephemeral venv on the CI runner. Baseline: 0 CVEs
        # after `uv lock --upgrade` cleared 14 transitive vulns.
        run: |
          uv export --frozen --no-dev --no-emit-workspace --format requirements-txt \
            | grep -v '@ git+' > /tmp/audit-reqs.txt
          uv tool run pip-audit --disable-pip -r /tmp/audit-reqs.txt

      - name: Pyright strict (scorers — non-locked files)
        # Dedicated blocking gate for the load-bearing scorer modules. Strict
        # mode is enforced via the top-level "strict" array in pyrightconfig.json
        # at file granularity (opportunistic_form4.py is SHA256-locked per
        # pre-reg ledger, so it stays in basic mode and isn't checked here).
        run: |
          uv run pyright \
            apps/alphalens-pipeline/alphalens_pipeline/scorers/_common.py \
            apps/alphalens-pipeline/alphalens_pipeline/scorers/cohen_malloy_classifier.py \
            apps/alphalens-pipeline/alphalens_pipeline/scorers/fcff_yield.py

      - name: Pyright strict (backtest)
        # Dedicated blocking gate for the Layer 3 backtest engine + its
        # auxiliary metrics/IC/theme modules. Wrong type at this boundary
        # corrupts BacktestReport.portfolio_returns -> wrong Sharpe ->
        # wrong verdict. Strict per pyrightconfig.json top-level "strict" array.
        run: uv run pyright apps/alphalens-research/alphalens_research/backtest/

      - name: Pyright strict (attribution)
        # Dedicated blocking gate for Layer 5 attribution — cost_model,
        # factor_analysis, regime, walk_forward, signal_independence,
        # signal_vol_regime, diagnostics. Wrong type here corrupts α t-stat,
        # Sharpe, hit-rate, regime breakdowns -> wrong verdict.
        run: uv run pyright apps/alphalens-research/alphalens_research/attribution/

      - name: Pyright type-check (basic global + strict per critical module)
        # Config: pyrightconfig.json at repo root. BLOCKING.
        # Global typeCheckingMode = "basic" — catches name resolution, attribute
        # access, obvious type mismatches without forcing exhaustive annotations
        # on math-heavy research code.
        # Strict per-module via top-level "strict" array on backtest/attribution/
        # scorers — these surfaces govern verdicts; wrong types corrupt α t-stats.
        # opportunistic_form4.py is in "exclude" because it is SHA256-locked
        # per pre-reg ledger (insider_pc_compound_2026_05_10) and cannot carry
        # type fixes.
        run: uv run pyright

      - name: Run tests with coverage
        run: |
          uv run coverage run -m unittest discover \
              -s apps/alphalens-research/tests \
              -t apps/alphalens-research
          uv run coverage report
          uv run coverage xml -o coverage.xml

      - name: Diff coverage gate (≥80% on PR-changed lines)
        # Only fires on pull_request events — diff-cover needs two refs to
        # compare. On push to main there's no diff to measure (the push IS
        # the merge); coverage XML still uploads for SonarCloud's main-branch
        # baseline.
        if: github.event_name == 'pull_request'
        # `--fail-under 80` blocks merge if PR-touched lines have <80%
        # coverage. The total-coverage figure stays informational; we
        # don't enforce a repo-wide threshold (research code is hard to
        # cover beyond ~70% without simulating real backtest data).
        #
        # `--exclude tests/live/test_*_live.py`: the L4 live vendor probes
        # (test-strategy Phase 5) are env-gated (skipUnless) and run ONLY in
        # the weekly `live-probes` job against real services — their bodies are
        # unreachable in hermetic CI BY DESIGN, so they cannot earn diff
        # coverage here. The shared classifier (`tests/live/__init__.py`) and
        # its hermetic test (`test_live_probe_helper.py`) are NOT excluded —
        # they run in this job and stay measured.
        run: |
          uv run diff-cover coverage.xml \
            --compare-branch origin/${{ github.base_ref }} \
            --fail-under 80 \
            --diff-range-notation "..." \
            --exclude "*/tests/live/test_*_live.py"

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v7
        with:
          name: coverage-xml
          path: coverage.xml
          retention-days: 14

  # -----------------------------------------------------------------------
  # Django app — pytest + ruff. Doesn't need libomp / lightgbm so we
  # stay on linux for faster runtime.
  # -----------------------------------------------------------------------
  django:
    name: django (DRF)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    # Postgres mirrors the prod engine (deploy/docker/django-prod uses
    # postgres:16-alpine). Only the migration-skew step opts into it via
    # DATABASE_URL; the main pytest step leaves DATABASE_URL unset and stays
    # on SQLite so the default suite is fast and the local `pytest` run needs
    # no DB. The skew reproduction (#331/#340 UndefinedColumn) is
    # Postgres-specific — SQLite RenameField rebuilds the table and can't
    # raise it — so it is skipped everywhere the engine isn't Postgres.
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: alphalens
          POSTGRES_PASSWORD: alphalens
          POSTGRES_DB: alphalens_skew_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U alphalens -d alphalens_skew_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python via uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.13"
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install workspace
        run: uv sync --group dev --frozen

      - name: Ruff lint (django)
        run: uv run ruff check apps/alphalens-django/

      - name: Missing-migration gate (makemigrations --check)
        working-directory: apps/alphalens-django
        # Fails CI if a model field was edited without generating its
        # migration. The test DB is built via `migrate`, so a model/schema
        # drift passes the pytest suite and only breaks at prod deploy
        # (`migrate` raises, or the column never lands). `--check` exits
        # non-zero when changes would be created; `--dry-run` keeps it from
        # writing any migration file. Settings module resolves via
        # manage.py's DJANGO_SETTINGS_MODULE default (config.settings.dev),
        # same as the neighbouring pytest step.
        run: uv run python manage.py makemigrations --check --dry-run

      - name: Pytest with coverage
        working-directory: apps/alphalens-django
        # Coverage scoped to the app source dirs (core, auth_cf, briefs, edge,
        # config, market) so test files themselves don't inflate the
        # denominator.
        # New Django apps MUST be added here — otherwise SonarCloud reports
        # "0% coverage on new code" even when pytest exercises every line.
        # XML is emitted at `apps/alphalens-django/coverage.xml` and uploaded
        # as a separate artifact (`coverage-xml-django`); SonarCloud is
        # configured in sonar-project.properties to consume both research +
        # django paths.
        run: |
          uv run coverage run --source=core,auth_cf,briefs,edge,config,market -m pytest -q
          uv run coverage report
          uv run coverage xml -o coverage.xml

      - name: Migration-skew reproduction (Postgres)
        working-directory: apps/alphalens-django
        # Pins the #331/#340 deploy-env-drift incident against the REAL engine:
        # a stale rebuild-cache image whose Brief model disagrees with the
        # migrated schema must FAIL LOUD (UndefinedColumn) and write zero rows,
        # never a silent partial cache. DATABASE_URL flips this run to the
        # Postgres service; test_migrate_skew.py self-skips on any non-Postgres
        # engine, so it only executes here. Separate step (not the coverage
        # run) keeps the default suite on SQLite.
        env:
          DATABASE_URL: postgres://alphalens:alphalens@localhost:5432/alphalens_skew_test
        run: uv run pytest briefs/tests/test_migrate_skew.py -v

      - name: Upload django coverage artifact
        uses: actions/upload-artifact@v7
        with:
          name: coverage-xml-django
          path: apps/alphalens-django/coverage.xml
          retention-days: 14

  # -----------------------------------------------------------------------
  # Web — SvelteKit type-check + Playwright hermetic smoke. Build verifies
  # the SPA still bundles after refactors.
  # -----------------------------------------------------------------------
  web:
    name: web (SvelteKit)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: "10"

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: apps/web/pnpm-lock.yaml

      - name: Install deps
        working-directory: apps/web
        run: pnpm install --frozen-lockfile

      - name: Type-check + svelte-check
        working-directory: apps/web
        run: pnpm run check

      - name: Unit tests (vitest)
        working-directory: apps/web
        # Fast hermetic unit suite (markdown sanitization, apiFetch auth
        # normalization, OpenAPI contract). Scoped to tests/unit/** so it
        # never overlaps the Playwright suite below.
        run: pnpm run test:unit

      - name: Build
        working-directory: apps/web
        run: pnpm run build

      - name: Install Playwright browser (chromium)
        working-directory: apps/web
        # playwright.config.ts targets a single chromium project. --with-deps
        # pulls the OS libraries the headless browser needs on ubuntu-latest.
        # Only chromium is installed (not webkit/firefox) to keep the step fast.
        run: pnpm exec playwright install --with-deps chromium

      - name: Web tests (Playwright)
        working-directory: apps/web
        # The hermetic Playwright suites (smoke, template-facts,
        # market-status, django-smoke) that `just test-web` runs locally —
        # they were NOT gated in CI before. `pnpm test` == `playwright test`;
        # its webServer config builds + previews the SPA on 127.0.0.1:4173,
        # so no separate server step is needed. CI=true forces playwright to
        # start its own server (reuseExistingServer is off under CI).
        run: pnpm test

  # -----------------------------------------------------------------------
  # SonarCloud — runs after research/django produce coverage. Skipped on
  # scheduled (weekly) CI to avoid daily quota churn.
  # -----------------------------------------------------------------------
  sonar:
    name: sonarcloud
    needs: [research, django, web]
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Download research coverage artifact
        uses: actions/download-artifact@v8
        with:
          name: coverage-xml
          # Land at repo root as coverage.xml (matches research source paths
          # referenced from sonar-project.properties).
          path: .

      - name: Download django coverage artifact
        uses: actions/download-artifact@v8
        with:
          name: coverage-xml-django
          # Land at apps/alphalens-django/coverage.xml so the relative paths
          # inside the file (core/views.py, briefs/...) resolve under that
          # working directory in SonarCloud.
          path: apps/alphalens-django

      - name: SonarCloud scan
        uses: SonarSource/sonarqube-scan-action@v8
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: >-
            ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' && '-Dsonar.branch.name=main' || '' }}
        continue-on-error: true

  # -----------------------------------------------------------------------
  # L4 live vendor probes (test-strategy Phase 5) — hit REAL services,
  # shape-only, never values. WEEKLY ONLY (`schedule` trigger); the
  # `if: schedule` guard keeps them off every push/PR so real-data variance,
  # vendor rate limits, and OpenRouter cost cannot flake a merge. On failure
  # the job opens a GitHub issue (a vendor changed shape, a DeepSeek model
  # retired with a 404, or the SEC index.htm format moved) so the operator
  # notices without a CI red on the PR path.
  # -----------------------------------------------------------------------
  live-probes:
    name: live-probes (weekly)
    # Weekly cron OR an explicit manual dispatch — NEVER push/PR (cost +
    # rate-limit + real-data variance must not flake a merge).
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python via uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.13"
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install workspace
        run: uv sync --group dev --frozen

      - name: Run live probes (shape-only — asserts non-emptiness, never values)
        env:
          SEC_LIVE_TEST: "1"
          OPENROUTER_LIVE_TEST: "1"
          POLYGON_LIVE_TEST: "1"
          YFINANCE_LIVE_TEST: "1"
          NVDA_QUBT_LIVE_TEST: "1"
          SEC_EDGAR_USER_AGENT: ${{ secrets.SEC_EDGAR_USER_AGENT }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          POLYGON_API_KEY: ${{ secrets.POLYGON_API_KEY }}
        run: |
          uv run python -m unittest discover \
            -s apps/alphalens-research/tests/live \
            -t apps/alphalens-research -v

      - name: Open an issue if a probe failed
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue create \
            --title "Weekly live-probes failed ($(date -u +%Y-%m-%d))" \
            --label "live-probe-failure" \
            --body "The weekly L4 live-probes job failed. Likely causes: a vendor changed response shape, a DeepSeek model retired (404 -> silent empty brief, incident #3), the SEC EX-99.1 index.htm format moved (incident #2), or a liquid ticker returned empty. Run log: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
