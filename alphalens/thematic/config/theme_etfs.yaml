version: 1
description: |
  Theme → thematic-ETF mapping for the Layer 3 verification gate. Each entry
  records the ETF ticker and the series name to match against SEC EDGAR
  NPORT-P filings (matched as a case-insensitive substring on the
  `<seriesName>` XML field).

  Maintenance: NPORT-P is filed quarterly. Re-pull holdings every ~90 days.
  If a fund is liquidated, merged, or renamed, update the `series_name`
  field accordingly.

themes:
  ai_semi:
    - {etf: SOXX, series_name: "iShares Semiconductor"}
    - {etf: SMH,  series_name: "VanEck Semiconductor"}
  ai_software:
    - {etf: BOTZ, series_name: "Global X Robotics"}
    - {etf: ARKQ, series_name: "ARK Autonomous"}
  quantum:
    - {etf: QTUM, series_name: "Defiance Quantum"}
  cyber:
    - {etf: CIBR, series_name: "NASDAQ Cybersecurity"}
    - {etf: HACK, series_name: "Amplify Cybersecurity"}
  biotech:
    - {etf: IBB,  series_name: "iShares Biotechnology"}
    - {etf: XBI,  series_name: "SPDR S&P Biotech"}
  clean_energy:
    - {etf: ICLN, series_name: "iShares Global Clean Energy"}
    - {etf: PBW,  series_name: "WilderHill Clean Energy"}
    - {etf: QCLN, series_name: "NASDAQ Clean Edge"}
  defense:
    - {etf: ITA,  series_name: "iShares U.S. Aerospace"}
    - {etf: PPA,  series_name: "Aerospace & Defense"}
  materials:
    - {etf: LIT,  series_name: "Global X Lithium"}
    - {etf: REMX, series_name: "Rare Earth"}
  med_devices:
    - {etf: IHI,  series_name: "iShares U.S. Medical Devices"}
