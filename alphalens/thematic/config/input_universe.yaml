version: 1
description: |
  News-source universe for thematic event-driven tool. These are MEGA-CAP names
  whose announcements ripple to second-order beneficiaries. NOT the output
  candidate universe (output is $500M-$10B small/mid caps surfaced by LLM
  reasoning + verification gates — those are NOT pre-listed).

  Refresh cadence: quarterly. Compare against:
  - S&P 100 components: https://en.wikipedia.org/wiki/S%26P_100
  - Add sector leaders by market cap > $100B OR strong theme association
    even at smaller cap (e.g. IONQ for quantum).
  Last refresh: 2026-05-16
  Total: ~130 tickers
