[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "alphalens"
version = "0.1.0"
description = "Stock analysis pipeline: event detection + screening + multi-agent LLM analysis"
readme = "README.md"
requires-python = ">=3.13"
dependencies = [
    "tradingagents @ file:./TradingAgents",
]

[project.scripts]
alphalens = "cli.main:app"

[tool.setuptools.packages.find]
include = ["alphalens*", "cli*"]
