# Virtual workspace root — owns shared tooling config; no top-level package.
#
# Members:
#   - apps/alphalens-research   (Typer CLI + research engine)
#   - apps/alphalens-django     (DRF briefs API)
#
# Setup (single venv at repo root):
#   uv sync           # installs every member + shared dev tools
#
# Per-member install (rare):
#   uv pip install -e apps/alphalens-research
#   uv pip install -e apps/alphalens-django

[tool.uv.workspace]
members = ["apps/alphalens-research", "apps/alphalens-django"]

[dependency-groups]
dev = [
    "ruff>=0.15.12",
    "coverage>=7.13.5",
    "pre-commit>=3.7",
    "bandit>=1.9.4",
    "httpx>=0.28.1",
]

[tool.ruff]
line-length = 100
target-version = "py313"
exclude = [
    ".venv",
    "build",
    "dist",
    "*.egg-info",
    "logs",
    "reports",
    ".alphalens",
    "apps/web",
    "apps/alphalens-django/.venv",
]

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
    "UP",  # pyupgrade
    "B",   # bugbear
    "C4",  # comprehensions
    "PIE", # misc
    "RUF", # ruff-specific
    "SIM", # simplify
    "PL",  # pylint subset
    "N",   # pep8-naming
]
ignore = [
    "E501",   # line-too-long (formatter handles it)
    "PLR2004",  # magic numbers — quant code uses many literals (lookback windows, thresholds)
    "PLR0913",  # too many args — research code often has wide signatures
    "PLR0915",  # too many statements — backtest functions are linear sequences
    "PLR0912",  # too many branches — verdict logic
    "N803",   # arg should be lowercase (pandas idioms: X, y)
    "N806",   # variable should be lowercase
    "B008",   # function call in default arg — typer.Option uses this
    "SIM108", # ternary refactor — sometimes hurts readability
    "PLC0415", # imports inside functions/methods — project pattern (lazy imports in tests + CLI)
    "RUF001",  # ambiguous unicode in strings — Polish docstrings/comments
    "RUF002",  # ambiguous unicode in docstrings — Polish-language docstrings
    "RUF003",  # ambiguous unicode in comments — Polish-language comments
    "PLC2401", # non-ASCII variable names — research math notation (α_q, ρ_t, β_smb) is project policy per CLAUDE.md
]

[tool.ruff.lint.per-file-ignores]
"apps/alphalens-research/tests/*" = [
    "PLR0915",  # tests can be long
    "B011",     # asserts in tests OK
    "B017",     # generic Exception in assertRaises is OK in test scaffolding
    "N801",     # SEC rule class names (TestPlan10b5_1Exclusion, TestJegadeesh11_1)
    "N802",     # SEC Form 4 transaction codes (test_..._code_P_, _S_, _A_) preserve case for clarity
    "F841",     # unused vars w fixture defs are OK
    "RUF012",   # mutable class defaults in stub fixtures are OK
    "B035",     # static-key dict comprehensions in test fixtures are intentional
    "SIM115",   # tempfile.NamedTemporaryFile + addCleanup is the established fixture pattern
    "SIM117",   # nested with-statements in tests highlight scope structure
    "PLW1510",  # subprocess.run in tests asserts on returncode explicitly; check= is the test's job
]
"apps/alphalens-research/alphalens_research/watchdog/lock.py" = [
    "N818",     # WorkerLockBusy is a state signal, not a fatal error — keep without Error suffix
]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
docstring-code-format = true
