[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "alphalens"
version = "0.1.0"
description = "Stock analysis pipeline: event detection + screening + multi-agent LLM analysis"
readme = "README.md"
requires-python = ">=3.13"
dependencies = []
# Note: tradingagents is installed separately as editable from ./TradingAgents
# Setup: `uv pip install -e ./TradingAgents && uv pip install -e .`

[project.scripts]
alphalens = "cli.main:app"

[tool.setuptools.packages.find]
include = ["alphalens*", "cli*"]
